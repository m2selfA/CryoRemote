name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test tools
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: python -m pytest

      - name: Compile sources
        run: python -m compileall src tests

  bundle-wheel:
    runs-on: windows-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ChimeraX
        id: install-chimerax
        shell: powershell
        run: |
          $consolePath = .\scripts\install_chimerax.ps1 -Version "1.12" -Sha256 "45A8368CD8BEE1218973BF615248C306303E61EAD1FC29FA052FE0E22BD22177" -InstallDir "$env:RUNNER_TEMP\ChimeraX"
          "console_path=$consolePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build ChimeraX bundle wheel
        shell: powershell
        run: '& "${{ steps.install-chimerax.outputs.console_path }}" --nogui --cmd "devel build . ; exit"'

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryoremote-wheel
          path: dist/*.whl
          if-no-files-found: error
